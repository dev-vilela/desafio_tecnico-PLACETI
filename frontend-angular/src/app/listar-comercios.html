<div class="mb-3">
  <p-button 
    label="Voltar" 
    icon="pi pi-arrow-left" 
    severity="secondary"
    (click)="voltar()">
  </p-button>
</div>

<h2>🏪 Comércios da Cidade</h2>

<p-table [value]="listaComercios">

  <ng-template pTemplate="header">
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>Responsável</th>
      <th>Tipo</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-comercio>
    <tr>
      <td>{{ comercio.id }}</td>
      <td>{{ comercio.nomeComercio }}</td>
      <td>{{ comercio.nomeResponsavel }}</td>
      <td>{{ comercio.tipo }}</td>
    </tr>
  </ng-template>

</p-table>
